name: Seed GC Session

on:
  workflow_dispatch: {}

jobs:
  seed:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check for session file
        run: |
          if [ ! -f pipeline/gc_session.json ]; then
            echo "ERROR: pipeline/gc_session.json not found in repo."
            echo "Commit it temporarily, run this workflow, then remove it."
            exit 1
          fi
          echo "Session file found: $(wc -c < pipeline/gc_session.json) bytes"

      - name: Save to cache
        uses: actions/cache/save@v4
        with:
          path: pipeline/gc_session.json
          key: gc-session-v2
