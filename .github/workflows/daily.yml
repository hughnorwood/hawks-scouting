name: Daily Pipeline

on:
  # Nightly cron disabled post-season (2026-05-05). Trigger manually via
  # workflow_dispatch when a refresh is needed. To re-enable, restore the
  # `schedule:` block below with cron "30 1 * * *" (9:30 PM EDT).
  workflow_dispatch: {}

permissions:
  contents: write

# Cancel any queued run when a new one is triggered — if the Mac was
# offline for several days, we don't want to plow through a backlog
# of stale runs once it wakes up.
concurrency:
  group: daily-pipeline
  cancel-in-progress: false

jobs:
  pipeline:
    runs-on: [self-hosted, macOS, hawks-scout]
    # 90 min covers a worst-case backfill (~30 games × ~90s transcribe each
    # + scrape + ingest). Steady-state daily runs of 1-3 new games finish
    # in well under 10 min.
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # actions/setup-python@v5 is broken on self-hosted macOS runners —
      # the prebuilt Python tarball's setup.sh hardcodes
      # `mkdir /Users/runner/hostedtoolcache` and fails on permission denied
      # under any non-`runner` user. We use the system Python instead
      # (verified compatible with all pipeline scripts).
      - name: Show Python version
        run: python3 --version

      - name: Install Python dependencies
        run: python3 -m pip install --user openpyxl anthropic python-dotenv

      - name: Install Playwright
        run: |
          python3 -m pip install --user playwright
          python3 -m playwright install chromium

      # ── Restore GC session from cache ──
      - name: Restore GC session
        uses: actions/cache/restore@v4
        id: gc-session-cache
        with:
          path: pipeline/gc_session.json
          key: gc-session-v2

      # ── Clean stale raw files ──
      # The self-hosted runner's working tree persists between runs, and
      # pipeline/raw/ is gitignored — so leftover .txt files from previous
      # runs accumulate forever. Without this step, the transcribe loop
      # below re-feeds every stale file to the Claude API every night.
      - name: Clean stale raw files
        run: |
          mkdir -p pipeline/raw
          rm -f pipeline/raw/*.txt
          # Reset the per-run ingest success marker so the commit step counts
          # only this run's successful Excel writes.
          rm -f pipeline/raw/_ingested.txt

      # ── Scrape ──
      - name: Scrape new games from GameChanger
        env:
          GC_USERNAME: ${{ secrets.GC_USERNAME }}
          GC_PASSWORD: ${{ secrets.GC_PASSWORD }}
        run: |
          mkdir -p pipeline/raw
          python3 pipeline/scrape.py

      # ── Save updated GC session to cache ──
      - name: Save GC session
        if: always()
        uses: actions/cache/save@v4
        with:
          path: pipeline/gc_session.json
          key: gc-session-v2-${{ github.run_id }}

      # ── Transcribe each new raw file ──
      - name: Transcribe new games
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          shopt -s nullglob
          RAW_FILES=(pipeline/raw/*.txt)

          if [ ${#RAW_FILES[@]} -eq 0 ]; then
            echo "No raw files to transcribe."
            echo "NEW_GAMES=" >> "$GITHUB_ENV"
            exit 0
          fi

          NEW_GAME_FILES=""
          for raw_file in "${RAW_FILES[@]}"; do
            echo "::group::Transcribing $raw_file"
            python3 pipeline/transcribe.py "$raw_file" || echo "WARNING: transcription failed for $raw_file — continuing"
            echo "::endgroup::"
          done

          # Identify newly created game files (untracked by git)
          NEW_GAME_FILES=$(git ls-files --others --exclude-standard -- games/*.md || true)
          echo "New game files: $NEW_GAME_FILES"
          echo "NEW_GAMES<<EOF" >> "$GITHUB_ENV"
          echo "$NEW_GAME_FILES" >> "$GITHUB_ENV"
          echo "EOF" >> "$GITHUB_ENV"

      # ── Ingest each NEW game markdown (skip already-committed files) ──
      - name: Ingest new games
        if: env.NEW_GAMES != ''
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          while IFS= read -r md_file; do
            [ -z "$md_file" ] && continue
            [ -f "$md_file" ] || continue
            echo "::group::Ingesting $md_file"
            python3 pipeline/ingest.py "$md_file" || echo "WARNING: ingestion failed for $md_file — continuing"
            echo "::endgroup::"
          done <<< "$NEW_GAMES"

      # ── Commit and push if anything changed ──
      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Count games that actually wrote rows to Excel during this run.
          # ingest.py appends a Game_ID line on every successful append; the
          # file is wiped at the start of each run by the "Clean stale raw
          # files" step. This is the source of truth — staged .md files in
          # games/ may include UNKNOWN_*.md and PC-failed transcriptions that
          # never reached the repository.
          if [ -f pipeline/raw/_ingested.txt ]; then
            INGESTED_COUNT=$(grep -c . pipeline/raw/_ingested.txt || echo 0)
          else
            INGESTED_COUNT=0
          fi

          if [ "$INGESTED_COUNT" -eq 0 ]; then
            echo "No games successfully ingested — skipping commit."
            echo "(Any new .md files in games/ are transcription/ingest"
            echo " failures and will be picked up on a future run after"
            echo " manual repair.)"
            exit 0
          fi

          # Stage new/changed pipeline output files
          # public/games/ is the deployed mirror consumed by the app — must stay in sync with games/
          git add -A games/ data/ public/repository.json public/games/

          if git diff --cached --quiet; then
            echo "Ingest marker reports ${INGESTED_COUNT} game(s) but no staged changes — skipping commit."
            exit 0
          fi

          git commit -m "pipeline: add ${INGESTED_COUNT} new game(s)

          Automated daily pipeline run."

          git push
          echo "Pushed ${INGESTED_COUNT} new game(s) to repository."
